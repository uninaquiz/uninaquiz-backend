# Air configuration for hot reload development

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "bin/uninaquiz-backend"
  cmd = "go build -o ./bin/uninaquiz-backend ./cmd"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "db/migrations"]
  exclude_file = []
  exclude_pattern = ["_test.go"]
  exclude_regex = ["_test.go"]
  exclude_s = ["assets", "tmp", "vendor", "testdata", "db/migrations"]
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = "0s"
  log = "tmp/air.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app_name = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true

