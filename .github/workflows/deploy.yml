name: Build and Deploy to EC2

on:
  workflow_dispatch:

env:
  GO_VERSION: '1.26.3'
  BINARY_NAME: uninaquiz-backend
  APP_PORT: 8080
  DEPLOY_PATH: /opt/uninaquiz

jobs:
  build:
    name: Build Go Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" \
            -o ${{ env.BINARY_NAME }} ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}
          path: ${{ env.BINARY_NAME }}
          retention-days: 1

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy binary to EC2
        run: |
          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ env.BINARY_NAME }} \
            ec2-user@${{ secrets.EC2_HOST }}:/tmp/${{ env.BINARY_NAME }}

      - name: Deploy and restart service
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ec2-user@${{ secrets.EC2_HOST }} << 'ENDSSH'

            # Stop the current service
            sudo systemctl stop uninaquiz || true

            # Move new binary into place
            sudo mv /tmp/uninaquiz-backend /opt/uninaquiz/uninaquiz-backend
            sudo chown appuser:appuser /opt/uninaquiz/uninaquiz-backend
            sudo chmod +x /opt/uninaquiz/uninaquiz-backend

            # Start the service
            sudo systemctl start uninaquiz

            # Wait for the application to start
            echo "Waiting for application to start..."
            sleep 5

            # Health check
            echo "Running health check..."
            for i in $(seq 1 5); do
              if curl -sf http://localhost:8080/api/health; then
                echo ""
                echo "Health check passed!"
                exit 0
              fi
              echo "Attempt $i failed, retrying in 3s..."
              sleep 3
            done

            echo "Health check failed after 5 attempts"
            sudo journalctl -u uninaquiz --no-pager -n 20
            exit 1
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
