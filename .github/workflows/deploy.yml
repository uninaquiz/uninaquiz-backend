name: Build and Deploy to EC2

on:
  workflow_dispatch:

env:
  GO_VERSION: '1.26.3'
  BINARY_NAME: uninaquiz-backend
  APP_PORT: 8080
  DEPLOY_PATH: /opt/uninaquiz

jobs:
  build:
    name: Build Go Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run Tests
        run: go test -v ./...

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" \
            -o ${{ env.BINARY_NAME }} ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}
          path: ${{ env.BINARY_NAME }}
          retention-days: 1

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (for scripts)
        uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}

      - name: Configure SSH Private Key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Securely Scan Host Keys
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy Binary and Deploy Script to EC2
        run: |
          scp -i ~/.ssh/deploy_key \
            ${{ env.BINARY_NAME }} scripts/deploy.sh \
            ec2-user@${{ secrets.EC2_HOST }}:/tmp/

      - name: Execute Remote Deployment
        run: |
          ssh -i ~/.ssh/deploy_key ec2-user@${{ secrets.EC2_HOST }} \
            "BINARY_NAME=${{ env.BINARY_NAME }} DEPLOY_PATH=${{ env.DEPLOY_PATH }} bash /tmp/deploy.sh"

      - name: Cleanup SSH Setup
        if: always()
        run: rm -rf ~/.ssh
